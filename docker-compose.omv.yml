version: '3.8'

services:
  hdr-transcode-manager:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        USE_HW: "true"
    container_name: hdr-transcode-manager
    restart: unless-stopped

    ports:
      - "8056:8080"

    volumes:
      - /srv/dev-disk-by-uuid-3d2a95e2-00dc-457b-956f-a6914dc44a9e/SSD/HDRTOSDR/plex-ffmpeg:/opt/plex-transcoder:ro
      - /srv/dev-disk-by-uuid-3d2a95e2-00dc-457b-956f-a6914dc44a9e/SSD/HDRTOSDR/data:/data
      - /srv/mergerfs/36TB/36TB/Series:/Series
      - /srv/mergerfs/36TB/36TB/Movies:/Movies
      - /srv/mergerfs/36TB/36TB:/36TB

    devices:
      - /dev/dri:/dev/dri

    environment:
      - DATABASE_URL=sqlite:////data/transcode.db
      - SCAN_INTERVAL=60000
      - LOG_RETENTION_DAYS=30
      - OUTPUT_BITRATE=4500
      - OUTPUT_RESOLUTION=1920x1080
      - MAX_CONCURRENT_TRANSCODES=2
      - SOFTWARE_FALLBACK=false
      - PLEX_TRANSCODER_PATH=/opt/plex-transcoder/PlexTranscoder
      - TZ=UTC
